        let isZooming = false;
        document.getElementById("map").addEventListener("wheel", (e) => {
            e.preventDefault();

            isZooming = true;

            const mapElement = document.getElementById("map");
            const zoomDirection = e.deltaY > 0 ? 1 : -1;
            const zoomScale = 0.3;
            const steps = 12;
            let step = 0;

            const rect = mapElement.getBoundingClientRect();
            const domPoint = new DOMPoint(e.clientX - rect.left, e.clientY - rect.top);
            const anchor = map.convertPointOnPageToCoordinate(domPoint);

            const startRegion = map.region;
            const targetSpan = new mapkit.CoordinateSpan(
                startRegion.span.latitudeDelta * (1 + zoomScale * zoomDirection),
                startRegion.span.longitudeDelta * (1 + zoomScale * zoomDirection)
            );

            function interpolate(a, b, t) {
                return a + (b - a) * t;
            }

            function animateZoom() {
                step++;
                const t = step / steps;

                const latDelta = interpolate(startRegion.span.latitudeDelta, targetSpan.latitudeDelta, t);
                const lonDelta = interpolate(startRegion.span.longitudeDelta, targetSpan.longitudeDelta, t);

                // Adjust center based on anchor (cursor) position

                map.region = new mapkit.CoordinateRegion(
                    new mapkit.Coordinate(newCenterLat, newCenterLon),
                    new mapkit.CoordinateSpan(latDelta, lonDelta)
                );

                if (step < steps) {
                    requestAnimationFrame(animateZoom);
                } else {
                    isZooming = false;
                }
            }
            requestAnimationFrame(animateZoom);

        function computeBounds(coords) {
            let minLat = coords[0].latitude, maxLat = coords[0].latitude;
            let minLon = coords[0].longitude, maxLon = coords[0].longitude;

            for (let i = 1; i < coords.length; i++) {
                const pt = coords[i];
                minLat = Math.min(minLat, pt.latitude);
                maxLat = Math.max(maxLat, pt.latitude);
                minLon = Math.min(minLon, pt.longitude);
                maxLon = Math.max(maxLon, pt.longitude);
            }

            const centerLat = (minLat + maxLat) / 2;
            const centerLon = (minLon + maxLon) / 2;
            const latDelta = (maxLat - minLat) * 1.2;
            const lonDelta = (maxLon - minLon) * 1.2;

            return new mapkit.CoordinateRegion(
                new mapkit.Coordinate(centerLat, centerLon),
                new mapkit.CoordinateSpan(latDelta, lonDelta)
            );
        }


        
async function interpretNaturalQuery(userQuery) {
  showSpinner();

  // small status label (optional)
  function setStatus(msg) {
    let el = document.getElementById("status-text");
    if (!el) {
      el = document.createElement("div");
      el.id = "status-text";
      el.style.position = "fixed";
      el.style.top = "70px";
      el.style.left = "50%";
      el.style.transform = "translateX(-50%)";
      el.style.background = "rgba(255,255,255,0.95)";
      el.style.padding = "8px 12px";
      el.style.borderRadius = "10px";
      el.style.boxShadow = "0 2px 8px rgba(0,0,0,0.15)";
      el.style.zIndex = "9999";
      el.style.fontFamily = "system-ui, sans-serif";
      el.style.fontSize = "13px";
      document.body.appendChild(el);
    }
    el.textContent = msg || "";
    el.style.display = msg ? "block" : "none";
  }

  try {
    // SSE endpoint (GET)
    const sseUrl = `https://api.lalgeo.ca/api/interpret_stream?q=${encodeURIComponent(userQuery)}`;
    const es = new EventSource(sseUrl);

    es.addEventListener("status", (e) => {
      setStatus(e.data);
    });

    es.addEventListener("result", (e) => {
      es.close();
      setStatus("");
      hideSpinner();

      const result = JSON.parse(e.data);
      console.log("Interpreted Result:", result);
      handleMapTask(result);
    });

    es.addEventListener("error", () => {
      // SSE errors can happen if proxy closes; fallback to POST
      es.close();
      setStatus("");
      fallbackInterpretPOST(userQuery);
    });

  } catch (err) {
    console.warn("SSE failed, falling back to POST:", err);
    fallbackInterpretPOST(userQuery);
  }
}

async function fallbackInterpretPOST(userQuery) {
  showSpinner();
  try {
    const response = await fetch("https://api.lalgeo.ca/api/interpret", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: userQuery })
    });

    if (!response.ok) {
      showErrorPopup("❌ Failed to interpret query.");
      return;
    }

    const result = await response.json();
    console.log("Interpreted Result (POST):", result);
    handleMapTask(result);
  } catch (err) {
    console.error(err);
    showErrorPopup("❌ Error processing query.");
  } finally {
    hideSpinner();
  }
}


        
        async function loadAndRenderFeatures(statField, geojson_url, centroids_url) {

            try {
                
                
                const response = await fetch(geojson_url);

                const contentType = response.headers.get("content-type") || "";
                if (!contentType.includes("application/json")) {
                    const text = await response.text();
                    console.error("❌ Non-JSON response from server:", text);
                    return;
                }

                const geojson = await response.json();
        

                if (!geojson || !geojson.type || geojson.type !== "FeatureCollection" || !Array.isArray(geojson.features)) {
                    console.error("GeoJSON is not valid FeatureCollection:", geojson);
                    return;
                }


                window.dynamicGeoJSON = geojson;

                if (centroids_url) {
                    try {
                        const centroidsResponse = await fetch(centroids_url);
                        const centroids = await centroidsResponse.json();
                        window.dynamicCentroids = centroids;
                    } catch (err) {
                        console.warn("Could not load centroids:", err);
                        window.dynamicCentroids = {};
                    }
                } else {
                    window.dynamicCentroids = {};
                }


                window.usStatistics = {
                    type: "FeatureCollection",
                    features: geojson.features.map(f => {
                        const props = f.properties || {};
                        const featureName =
                            props.name ||
                            props.NAME ||
                            props.admin ||
                            props.name_long ||
                            props.label ||
                            props.geounit ||
                            null;

                        const normalized = featureName?.trim().toLowerCase();
                        const statValue = window.dynamicStatistics?.[normalized] ?? null;

                        return {
                            type: "Feature",
                            properties: {
                                name: featureName,
                                [statField]: statValue
                            }
                        };
                    })
                };

                renderChoropleth(statField, geojson);
                // 👇 Show the share button now that the map is ready
                document.querySelector(".share-button").style.display = "flex";
            } catch (error) {
                console.error("Failed to load GeoJSON:", error);
            }
        }

        function getColorForValue(norm) {
            const colors = [
                [68, 1, 84],
                [59, 82, 139],
                [33, 145, 140],
                [94, 201, 97],
                [253, 231, 37]
            ];

            const idx = norm * (colors.length - 1);
            const low = Math.floor(idx);
            const high = Math.min(colors.length - 1, Math.ceil(idx));
            const ratio = idx - low;

            const interpolate = (a, b) => Math.round(a + (b - a) * ratio);
            const [r1, g1, b1] = colors[low];
            const [r2, g2, b2] = colors[high];

            const r = interpolate(r1, r2);
            const g = interpolate(g1, g2);
            const b = interpolate(b1, b2);

            return `rgb(${r}, ${g}, ${b})`;
        }

        
        function getPolygonCoordinates(geometry) {
          if (geometry.type === "Polygon") {
            return geometry.coordinates;
          } else if (geometry.type === "MultiPolygon") {
            // Flatten multipolygon into one array of rings
            return geometry.coordinates.flat();
          }
          return [];
        }


        
        function renderChoropleth(statField) {
            if (!window.dynamicGeoJSON || !window.usStatistics) {
                console.warn("Missing GeoJSON or data");
                return;
            }
            

            // Remove previous overlays if any
            if (window.stateOverlays) {
                window.stateOverlays.forEach(o => map.removeOverlay(o));
            }
            window.stateOverlays = [];

            if (window.stateAnnotations) {
                window.stateAnnotations.forEach(a => map.removeAnnotation(a));
            }
            window.stateAnnotations = [];

            const values = usStatistics.features
                .map(f => f.properties[statField])
                .filter(v => typeof v === "number" && !isNaN(v));

            if (values.length === 0) {
                console.warn("No valid statistical values found.");
                return;
            }
            const min = Math.min(...values);
            const max = Math.max(...values);


            // Step 1: Sort features by stat value (descending)
            const rankedFeatures = [...window.dynamicGeoJSON.features]
              .map(feature => {
                const name = feature.properties.name;
                const normalizedName = name.trim().toLowerCase();
                const value = window.dynamicStatistics?.[normalizedName] ?? null;
                return { feature, value };
              })
              .filter(f => f.value !== null && !isNaN(f.value))
              .sort((a, b) => b.value - a.value); // descending

              
            const allCoords = [];
              
            // Step 2: Loop with ranking index
            rankedFeatures.forEach(({ feature, value }, index) => {
                const stateName = feature.properties.name;
                const norm = (value - min) / (max - min);
                const fillColor = getColorForValue(norm);
                const rings = getPolygonCoordinates(feature.geometry);
                
                // 🟪 Update legend labels
                document.getElementById("legend-min").textContent = min.toLocaleString();
                document.getElementById("legend-max").textContent = max.toLocaleString();
                document.getElementById("legend-title").textContent = `${statField.charAt(0).toUpperCase() + statField.slice(1)} (${window.dynamicStatUnit || ""})`;

                // 🟪 Draw legend color gradient
                const canvas = document.getElementById("legend-gradient");
                const ctx = canvas.getContext("2d");
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                for (let i = 0; i <= 100; i++) {
                    const color = getColorForValue(i / 100);
                    gradient.addColorStop(i / 100, color);
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);


                // Add polygons
                rings.forEach(ring => {
                    const coords = ring.map(([lon, lat]) => new mapkit.Coordinate(lat, lon)).filter(Boolean);
                    if (coords.length > 2) {
                        const overlay = new mapkit.PolygonOverlay(coords);
                        overlay.style = new mapkit.Style({
                            fillColor: fillColor,
                            fillOpacity: 0.9,
                            strokeColor: "#333",
                            lineWidth: 1
                        });
                        map.addOverlay(overlay);
                        window.stateOverlays.push(overlay);
                    }
                });

                // Add numbered bubble label
                const centroid = window.dynamicCentroids?.[stateName];
                if (centroid) {
                    const [lat, lon] = centroid;
                    const unit = window.dynamicStatUnit || "";

                    const statLabelText = `${statField.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}: ${value.toLocaleString()} ${unit}`;

                    const annotation = new mapkit.MarkerAnnotation(
                        new mapkit.Coordinate(lat, lon),
                        {
                            glyphText: `${index + 1}`,
                            title: stateName,
                            subtitle: statLabelText,
                            color: "#007aff",
                            selected: false
                        }
                    );
                    map.addAnnotation(annotation);
                    window.stateAnnotations.push(annotation);

                    // 🟦 Custom HTML label: show State name + stat text
                    const labelFactory = function(coordinate, options) {
                        const container = document.createElement("div");
                        container.className = "stat-label-annotation";

                        const name = document.createElement("div");
                        name.className = "stat-label-name";
                        name.textContent = stateName;

                        const value = document.createElement("div");
                        value.className = "stat-label-value";
                        value.textContent = statLabelText;

                        container.appendChild(name);
                        container.appendChild(value);
                        container.style.display = "none";

                        return container;
                    };

                    const statLabelAnnotation = new mapkit.Annotation(
                        new mapkit.Coordinate(lat, lon),
                        labelFactory
                    );
                    map.addAnnotation(statLabelAnnotation);
                    window.stateAnnotations.push(statLabelAnnotation);
                }
            });
            
            window.dynamicGeoJSON.features.forEach(f => {
                const coords = f.geometry.coordinates;
                const depth = f.geometry.type === "Polygon" ? 1 : 2;
                
                const flattened = coords.flat(depth);
                flattened.forEach(c => {
                    if (Array.isArray(c) && c.length >= 2) {
                        allCoords.push(new mapkit.Coordinate(c[1], c[0]));
                    }
                });
            });
            if (allCoords.length > 0) {
                const lats = allCoords.map(c => c.latitude);
                const lons = allCoords.map(c => c.longitude);

                const minLat = Math.min(...lats);
                const maxLat = Math.max(...lats);
                const minLon = Math.min(...lons);
                const maxLon = Math.max(...lons);

                const centerLat = (minLat + maxLat) / 2;
                const centerLon = (minLon + maxLon) / 2;

                const region = new mapkit.CoordinateRegion(
                    new mapkit.Coordinate(centerLat, centerLon),
                    new mapkit.CoordinateSpan(maxLat - minLat, maxLon - minLon)
                );

                map.region = region;
            }


        }


        function handleMapTask(task) {
        // POI mode
        if (task.task === "show_points") {
            hideSpinner();

            if (!task.points || task.points.length === 0) {
            showErrorPopup("❌ No matching places found.");
            return;
            }

            // Clear old annotations/overlays (optional)
            if (window.stateOverlays) window.stateOverlays.forEach(o => map.removeOverlay(o));
            if (window.stateAnnotations) window.stateAnnotations.forEach(a => map.removeAnnotation(a));
            window.stateOverlays = [];
            window.stateAnnotations = [];

            // Add pins
            const coords = [];
            task.points.forEach(p => {
            const coord = new mapkit.Coordinate(p.lat, p.lon);
            coords.push(coord);

            const ann = new mapkit.MarkerAnnotation(coord, {
                title: p.name,
                subtitle: p.address || ""
            });
            map.addAnnotation(ann);
            window.stateAnnotations.push(ann);
            });

            // Zoom to bounds
            if (coords.length > 1) {
            map.region = computeBounds(coords);
            } else {
            map.region = new mapkit.CoordinateRegion(coords[0], new mapkit.CoordinateSpan(0.05, 0.05));
            }

            document.querySelector(".share-button").style.display = "flex";
            return;
        }

        // create_map mode
        if (task.task === "create_map" && task.geojson_url) {
            // If statistics are empty, it means "intent-only" (unsupported overlay right now)
            if (!task.statistics || Object.keys(task.statistics).length === 0) {
            showErrorPopup("⚠️ That overlay isn’t supported yet. Try: population, median income, bachelor’s degree.");
            return;
            }

            window.dynamicStatField = task.overlay;
            window.dynamicStatUnit = task.unit || "";
            window.dynamicStatistics = Object.fromEntries(
            Object.entries(task.statistics).map(([k, v]) => [k.toLowerCase(), v])
            );

            const localGeojsonUrl = task.geojson_url.startsWith("/")
            ? window.location.origin + task.geojson_url
            : task.geojson_url.replace(/^https:\/\/[^/]+/, window.location.origin);

            const localCentroidsUrl = task.centroids_url
            ? (task.centroids_url.startsWith("/")
                ? window.location.origin + task.centroids_url
                : task.centroids_url.replace(/^https:\/\/[^/]+/, window.location.origin))
            : undefined;

            // parallel load (faster)
            loadAndRenderFeatures(task.overlay, localGeojsonUrl, localCentroidsUrl);

            const disclaimerBox = document.getElementById("data-disclaimer");
            if (task.source && task.source.toLowerCase().includes("census")) {
            disclaimerBox.innerHTML = `
                Data provided by the <a href="https://www.census.gov/" target="_blank" style="color:#007aff; text-decoration: underline;">
                U.S. Census Bureau</a>.<br>
                Accuracy based on official government statistics.
            `;
            } else {
            disclaimerBox.innerHTML = `
                ⚠️ Data may be incomplete.<br>
                Use with caution.
            `;
            }
            disclaimerBox.style.display = "block";
        } else {
            showErrorPopup("❌ Unsupported or malformed task");
            console.warn("Unhandled task:", task);
        }
        }




        document.getElementById("dataSearchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const query = this.value;
                interpretNaturalQuery(query);  // Ensure this function is already defined elsewhere
            }
        });
        
    </script>

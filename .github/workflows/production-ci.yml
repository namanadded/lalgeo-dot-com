name: Production CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  production-ci:
    name: Production CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            maps/package-lock.json

      - name: Validate static entry points
        run: |
          test -f index.html
          test -f lalgeo-app.html
          test -f lalgeo-data-manager.html
          test -f lalgeosurvey.html

      - name: Check local static links
        run: node .github/scripts/check-static-links.mjs

      - name: Check maps external link security
        working-directory: maps
        run: npm run test:external-link-security

      - name: Check maps frame viewport fallback
        working-directory: maps
        run: npm run test:maps-frame-viewport

      - name: Check maps mobile search input hints
        working-directory: maps
        run: npm run test:search-input-mobile

      - name: Check maps button type safety
        working-directory: maps
        run: npm run test:button-type-safety

      - name: Check Dropbox status accessibility
        working-directory: maps
        run: npm run test:dropbox-status-a11y

      - name: Check Dropbox disconnected recovery
        working-directory: maps
        run: npm run test:dropbox-disconnected-recovery

      - name: Check share toast accessibility
        working-directory: maps
        run: npm run test:share-toast-a11y

      - name: Check quick actions accessibility
        working-directory: maps
        run: npm run test:quick-actions-a11y

      - name: Check empty state Dropbox flow
        working-directory: maps
        run: npm run test:empty-dropbox-flow

      - name: Check maps panel toggle accessibility
        working-directory: maps
        run: npm run test:panel-toggle-a11y

      - name: Check maps feature selection highlighting
        working-directory: maps
        run: npm run test:feature-selection-highlight

      - name: Check maps tool panel region accessibility
        working-directory: maps
        run: npm run test:tool-panel-regions

      - name: Check mobile project onboarding
        working-directory: maps
        run: npm run test:mobile-project-onboarding

      - name: Check maps top menu accessibility
        working-directory: maps
        run: npm run test:top-menu-a11y

      - name: Check maps toolbar architecture
        working-directory: maps
        run: npm run test:toolbar-architecture

      - name: Check maps toolbar overflow accessibility
        working-directory: maps
        run: npm run test:toolbar-overflow-a11y

      - name: Check maps survey table accessibility
        working-directory: maps
        run: npm run test:survey-table-a11y

      - name: Check maps view menu accessibility
        working-directory: maps
        run: npm run test:view-menu-a11y

      - name: Check cloud storage recovery contracts
        working-directory: maps
        run: npm run test:cloud-storage
      - name: Check maps mobile menu organization
        working-directory: maps
        run: npm run test:mobile-menu-organization

      - name: Check maps mobile feature details
        working-directory: maps
        run: npm run test:mobile-feature-details

      - name: Check maps workflow UI
        working-directory: maps
        run: npm run test:workflow-ui

      - name: Check maps control layout
        working-directory: maps
        run: npm run test:map-control-layout

      - name: Install maps dependencies
        working-directory: maps
        run: npm ci

      - name: Test maps route configuration
        working-directory: maps
        run: npm run test:mapkit-route

      - name: Build maps app
        working-directory: maps
        run: npm run build

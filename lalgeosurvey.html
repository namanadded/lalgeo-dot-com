<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LalGeo Survey Archived</title>
  <link rel="canonical" href="https://maps.lalgeo.com/maps">
  <meta http-equiv="refresh" content="0; url=https://maps.lalgeo.com/maps">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #08121e;
      color: #e5eef8;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(420px, calc(100% - 32px));
      text-align: center;
    }
    a {
      color: #8ff0dc;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace("https://maps.lalgeo.com/maps");
  </script>
</head>
<body>
  <main>
    <h1>LalGeo Survey has moved</h1>
    <p>Continue to <a href="https://maps.lalgeo.com/maps">maps.lalgeo.com/maps</a>.</p>
  </main>
</body>
</html>

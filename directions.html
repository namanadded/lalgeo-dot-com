    <script>
        const hostname = window.location.hostname;

        const token = hostname.includes("lalgeo.ca")
          ? "eyJraWQiOiJaNTM3TTc2Qk1RIiwidHlwIjoiSldUIiwiYWxnIjoiRVMyNTYifQ.eyJpc3MiOiJKOTU2Mkw2TFE2IiwiaWF0IjoxNzQ3MDk1MzUwLCJvcmlnaW4iOiJsYWxnZW8uY2EifQ.lFsIe9182uBOQ_q2hW1JspNpieuttywt7TgL7GzzcOOCqTDi32Fd59waM4wZnUqys0xLt3Bh_hpK-OHZH6ocoA"
          : "eyJraWQiOiIzOVBKMjNNODVRIiwidHlwIjoiSldUIiwiYWxnIjoiRVMyNTYifQ.eyJpc3MiOiJKOTU2Mkw2TFE2IiwiaWF0IjoxNzQ3MDk1MzUwLCJvcmlnaW4iOiJsYWxnZW8uY29tIn0.CIkZ1wlCStvy0oTTeH4AVBc5EigAa6JFFdFh5bjd7iMOOnVnJ_T4ZDplj5YtL4pxooL1iGYngNz9gAKP4VKgbw";

        mapkit.init({
          authorizationCallback: function(done) {
            done(token);
          }
        });
        

        let locationWatcher = null;
        let voiceLang = 'en-US'; // Your chosen language
        let currentSteps = [];
        let voiceNavActive = false;
        let voiceTimeouts = [];

        // Helper to calculate distance between two coordinates
        function getDistance(coord1, coord2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = coord1.latitude * Math.PI / 180;
            const φ2 = coord2.latitude * Math.PI / 180;
            const Δφ = (coord2.latitude - coord1.latitude) * Math.PI / 180;
            const Δλ = (coord2.longitude - coord1.longitude) * Math.PI / 180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // in meters
        }

        function startVoiceNavigation(steps) {
            stopVoice(); // Stop any active voice nav
            currentSteps = steps.map(step => ({ ...step, announced: false }));
            voiceNavActive = true;
            const destination = currentSteps[currentSteps.length - 1].path.slice(-1)[0]; // Approximate final destination

            locationWatcher = navigator.geolocation.watchPosition(
                (position) => {
                    const userCoord = { latitude: position.coords.latitude, longitude: position.coords.longitude };
                    // 🔥 Follow user on map
                    map.region = new mapkit.CoordinateRegion(
                        new mapkit.Coordinate(userCoord.latitude, userCoord.longitude),
                        new mapkit.CoordinateSpan(0.005, 0.005)
                    );
                    showUserLocation(new mapkit.Coordinate(userCoord.latitude, userCoord.longitude));

                    let onCourse = false;
                    for (let i = 0; i < currentSteps.length; i++) {
                        const step = currentSteps[i];
                        const stepCoord = step.path && step.path.length > 0 ? step.path[0] : (step.coordinate || userCoord);
                        const distance = getDistance(userCoord, stepCoord);

                        if (distance < 50 && !step.announced) {
                            const instruction = naturalizeInstruction(step.instructions);
                            speakDirection(instruction);
                            currentSteps[i].announced = true;
                        }
                        if (distance < 200) onCourse = true; // 👈 Adjust threshold (200 meters) as needed
                    }

                    // 🔁 Re-route if off-course
                    if (!onCourse) {
                        console.warn("Off-course detected! Recalculating route...");
                        getDirections(destination.latitude, destination.longitude); // Or use stored destination lat/lon
                    }
                },
                (error) => {
                    console.error("Geolocation error:", error);
                    if (error.code === error.PERMISSION_DENIED) {
                        alert("Please allow location access to enable navigation.");
                    } else if (error.code === error.POSITION_UNAVAILABLE) {
                        alert("Location position is unavailable.");
                    } else if (error.code === error.TIMEOUT) {
                        alert("Location request timed out.");
                    }
                },
                { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
            );
        }

        function stopVoice() {
            speechSynthesis.cancel();
            voiceNavActive = false;
            currentSteps = [];
            if (locationWatcher !== null) {
                navigator.geolocation.clearWatch(locationWatcher);
                locationWatcher = null;
            }
        }

        // Replaces "Dr" with "Drive" and "SE" with "South East"
        function naturalizeInstruction(text) {
            if (typeof text !== 'string') {
                console.warn("Instruction is not a valid string:", text);
                return "Proceed to next step"; // Fallback default
            }
            return text
                .replace(/\bDr\b/g, "Drive")
                .replace(/\bSE\b/g, "South East")
                .replace(/\bSW\b/g, "South West")
                .replace(/\bNE\b/g, "North East")
                .replace(/\bNW\b/g, "North West");
        }

        function speakDirection(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = voiceLang;
            speechSynthesis.speak(utterance);
        }

        const map = new mapkit.Map("map", {
            isZoomEnabled: true,
            isScrollEnabled: true,
            showsZoomControl: true,
            showsCompass: mapkit.FeatureVisibility.Visible
        });

        map.addEventListener("select", (event) => {
            if (!event || !event.overlay || event.overlay.routeIndex === undefined) return;

            const selectedIndex = event.overlay.routeIndex;
            allRouteOverlays.forEach((overlay, idx) => {
                overlay.style = new mapkit.Style({
                    strokeColor: idx === selectedIndex ? "#007aff" : "#999",
                    lineWidth: idx === selectedIndex ? 10 : 6,
                    lineDash: idx === selectedIndex ? [] : [6, 4],
                    lineJoin: "round",
                    lineCap: "round"
                });

                if (idx === selectedIndex && overlay.routeCoordinates?.length) {
                    const bounds = computeBounds(overlay.routeCoordinates);
                    map.region = bounds;

                    openSidebarPanel();
                    if (window.currentRouteData && window.currentRouteData[selectedIndex]) {
                        const selectedRoute = window.currentRouteData[selectedIndex];
                        const durationMinutes = Math.round(selectedRoute.expectedTravelTime / 60);
                        const distanceKm = (selectedRoute.distance / 1000).toFixed(2);
                        const arrivalTime = new Date(Date.now() + selectedRoute.expectedTravelTime * 1000);
                        const arrivalTimeStr = arrivalTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const routeName = selectedRoute.name || "Unnamed Route";
                        const mode = {
                            [mapkit.Directions.Transport.Automobile]: "Automobile",
                            [mapkit.Directions.Transport.Walking]: "Walking",
                            [mapkit.Directions.Transport.Transit]: "Transit"
                        }[selectedRoute.transportType] || "Unknown";

                        sidebarContentElement.innerHTML = renderRouteSummary({
                            durationMinutes,
                            distanceKm,
                            arrivalTimeStr,
                            routeName,
                            mode
                        });

                        const startBtn = document.getElementById("startVoiceNav");
                        const stopBtn = document.getElementById("stopVoiceNav");
                        if (startBtn) {
                            startBtn.addEventListener("click", () => {
                                startVoiceNavigation(selectedRoute.steps);
                            });
                        }
                        if (stopBtn) {
                            stopBtn.addEventListener("click", stopVoice);
                        }
                    }
                }
            });
        });

        let userLocationAnnotation = null;
        function showUserLocation(coord) {
            if (userLocationAnnotation) {
                map.removeAnnotation(userLocationAnnotation);
            }
            // Create a dummy image as glyph (or use a custom pin image)
            const annotation = new mapkit.MarkerAnnotation(coord, {
                color: "#007aff",
                glyphText: "⚪", // you could also use glyphImage: {url: "custom-icon.svg"}
                title: "You are here",
                subtitle: ""
            });
            userLocationAnnotation = annotation;
            map.addAnnotation(userLocationAnnotation);
            if (originField) {
                originField.value = "Your location";
            }
        }

        let isZooming = false;
        document.getElementById("map").addEventListener("wheel", (e) => {
            e.preventDefault();
            if (isZooming) return;
            isZooming = true;

            const mapElement = document.getElementById("map");
            const zoomDirection = e.deltaY > 0 ? 1 : -1;
            const zoomScale = 0.3;
            const steps = 12;
            let step = 0;

            const rect = mapElement.getBoundingClientRect();
            const domPoint = new DOMPoint(e.clientX - rect.left, e.clientY - rect.top);
            const anchor = map.convertPointOnPageToCoordinate(domPoint);

            const startRegion = map.region;
            const targetSpan = new mapkit.CoordinateSpan(
                startRegion.span.latitudeDelta * (1 + zoomScale * zoomDirection),
                startRegion.span.longitudeDelta * (1 + zoomScale * zoomDirection)
            );

            function interpolate(a, b, t) {
                return a + (b - a) * t;
            }

            function animateZoom() {
                step++;
                const t = step / steps;

                const latDelta = interpolate(startRegion.span.latitudeDelta, targetSpan.latitudeDelta, t);
                const lonDelta = interpolate(startRegion.span.longitudeDelta, targetSpan.longitudeDelta, t);
                const zoomRatio = latDelta / startRegion.span.latitudeDelta;

                // Adjust center based on anchor (cursor) position
                const newCenterLat = anchor.latitude - (anchor.latitude - startRegion.center.latitude) * zoomRatio;
                const newCenterLon = anchor.longitude - (anchor.longitude - startRegion.center.longitude) * zoomRatio;

                map.region = new mapkit.CoordinateRegion(
                    new mapkit.Coordinate(newCenterLat, newCenterLon),
                    new mapkit.CoordinateSpan(latDelta, lonDelta)
                );

                if (step < steps) {
                    requestAnimationFrame(animateZoom);
                } else {
                    isZooming = false;
                }
            }
            requestAnimationFrame(animateZoom);
        }, { passive: false });

        let myLocationCoord = null; // global variable to track your location
        let currentStepIndex = 0;

        const fallbackRegion = new mapkit.CoordinateRegion(
            new mapkit.Coordinate(51.0447, -114.0719),
            new mapkit.CoordinateSpan(0.05, 0.05)
        );
        map.region = fallbackRegion;

        const searchField = document.getElementById("searchInput");
        const search = new mapkit.Search({ region: map.region });
        fetch("https://ipapi.co/json/")
          .then(res => res.json())
          .then(data => {
            if (data && data.latitude && data.longitude) {
              const approxCoord = new mapkit.Coordinate(data.latitude, data.longitude);
              const approxRegion = new mapkit.CoordinateRegion(
                approxCoord,
                new mapkit.CoordinateSpan(0.2, 0.2)
              );
              map.region = approxRegion;
              search.region = approxRegion;
            }
          })
          .catch(err => {
            console.warn("IP-based geolocation failed:", err);
            map.region = fallbackRegion;
            search.region = fallbackRegion;
          });
        const clearSearch = document.getElementById("clearSearch");
        const searchButton = document.getElementById("searchBtn");
        const directionsShortcut = document.getElementById("openDirections");
        const closeSidebarBtn = document.getElementById("closeSidebar");
        const sidebarElement = document.getElementById("sidebar");
        const sidebarContentElement = document.getElementById("sidebar-content");
        const destinationField = document.getElementById("destinationInput");
        const originField = document.getElementById("originInput");

        const openSidebarPanel = () => {
            if (sidebarElement) {
                sidebarElement.style.display = "flex";
                sidebarElement.scrollTop = 0;
            }
        };

        const closeSidebarPanel = () => {
            if (sidebarElement) {
                sidebarElement.style.display = "none";
            }
        };

        if (directionsShortcut) {
            directionsShortcut.addEventListener("click", openSidebarPanel);
        }
        if (closeSidebarBtn) {
            closeSidebarBtn.addEventListener("click", closeSidebarPanel);
        }

        const renderRouteSummary = ({ durationMinutes, distanceKm, arrivalTimeStr, routeName, mode }) => `
            <div class="gm-route-summary">
                <div>
                    <p class="gm-route-duration">${durationMinutes} min</p>
                    <p class="gm-route-meta">${distanceKm} km • Arrive by ${arrivalTimeStr}</p>
                </div>
                <span class="gm-route-mode">${mode}</span>
            </div>
            <div class="gm-route-meta">Route: ${routeName}</div>
            <label for="langSelect" class="gm-route-meta" style="display:block; margin-top:12px;">Voice language</label>
            <select id="langSelect" class="gm-select">
                <option value="en-US">English</option>
                <option value="fr-FR">French</option>
                <option value="hi-IN">Hindi</option>
            </select>
            <div class="gm-voice-actions">
                <button id="startVoiceNav" type="button">Start voice</button>
                <button id="stopVoiceNav" type="button">Stop</button>
            </div>
        `;

        searchField.addEventListener("input", () => {
            if (clearSearch) {
                clearSearch.style.display = searchField.value ? "inline" : "none";
            }
        });

        const resultsList = document.createElement("ul");
        resultsList.id = "search-suggestions";
        document.body.appendChild(resultsList);

        let currentAnnotation = null;
        let activeDestinationInfo = null;

        function showSidebar(place) {
            if (!place) return;

            const name = place.name || "Unknown place";
            const address = place.formattedAddress || "No address available.";
            const initial = name.trim().charAt(0).toUpperCase() || "•";

            activeDestinationInfo = {
                name,
                address,
                latitude: place.coordinate.latitude,
                longitude: place.coordinate.longitude
            };

            if (destinationField) {
                destinationField.value = name;
            }

            sidebarContentElement.innerHTML = `
                <div class="gm-place-card">
                    <div class="gm-place-initial">${initial}</div>
                    <div>
                        <div class="gm-place-name">${name}</div>
                        <div class="gm-place-address">${address}</div>
                        ${place.category ? `<div class="gm-place-category">${place.category}</div>` : ""}
                        ${place.phoneNumber ? `<div class="gm-place-phone">${place.phoneNumber}</div>` : ""}
                    </div>
                </div>
                <button class="gm-primary-btn" type="button" id="sidebarDirectionsBtn">Get directions</button>
                ${place.url ? `<a class="gm-secondary-link" href="${place.url}" target="_blank" rel="noopener">View website</a>` : ""}
            `;

            openSidebarPanel();

            const sidebarDirectionsBtn = document.getElementById("sidebarDirectionsBtn");
            if (sidebarDirectionsBtn) {
                sidebarDirectionsBtn.addEventListener("click", () => {
                    getDirections(place.coordinate.latitude, place.coordinate.longitude);
                });
            }
        }

        function createAnnotation(place) {
            const annotation = new mapkit.MarkerAnnotation(place.coordinate, {
                title: place.name,
                subtitle: place.formattedAddress
            });
            map.addAnnotation(annotation);
            showSidebar(place);
            return annotation;
        }

        searchField.addEventListener("input", () => {
            const query = searchField.value;
            if (!query) {
                resultsList.style.display = "none";
                return;
            }
            search.search(query, (error, data) => {
                if (error || !data.places) return;

                resultsList.innerHTML = "";
                data.places.forEach(place => {
                    const li = document.createElement("li");
                    li.innerHTML = `<strong>${place.name}</strong><br/><small>${place.formattedAddress || ""}</small>`;
                    li.addEventListener("click", () => {
                        resultsList.style.display = "none";
                        searchField.value = place.name;
                        map.region = new mapkit.CoordinateRegion(place.coordinate, new mapkit.CoordinateSpan(0.01, 0.01));
                        if (currentAnnotation) {
                            map.removeAnnotation(currentAnnotation);
                        }
                        currentAnnotation = createAnnotation(place);
                    });
                    resultsList.appendChild(li);
                });
                resultsList.style.display = "block";
            });
        });

        if (clearSearch) {
            clearSearch.addEventListener("click", () => {
                searchField.value = "";
                clearSearch.style.display = "none";
                resultsList.style.display = "none";
                stopVoice(); // Stop voice navigation if active
                closeSidebarPanel();
                if (currentAnnotation) { // Remove current place annotation (if any)
                    map.removeAnnotation(currentAnnotation);
                    currentAnnotation = null;
                }
                if (allRouteOverlays.length > 0) { // Remove all route overlays
                    allRouteOverlays.forEach(o => map.removeOverlay(o));
                    allRouteOverlays = [];
                }
                sidebarContentElement.innerHTML = ""; // Clear sidebar content
                window.currentRouteData = null; // Optionally reset route data
                activeDestinationInfo = null;
                if (destinationField) {
                    destinationField.value = "Choose destination";
                }
                const qrContainer = document.getElementById("qrCodeContainer");
                if (qrContainer) {
                    qrContainer.style.display = "none"; // Hide QR code container
                }
            });
        }


        function handleSearchSubmit() {
            const query = searchField.value.trim();
            if (!query) {
                resultsList.style.display = "none";
                return;
            }
            search.search(query, (error, data) => {
                if (error || !data.places || data.places.length === 0) return;
                const place = data.places[0];
                map.region = new mapkit.CoordinateRegion(place.coordinate, new mapkit.CoordinateSpan(0.01, 0.01));
                if (currentAnnotation) {
                    map.removeAnnotation(currentAnnotation);
                }
                currentAnnotation = createAnnotation(place);
                resultsList.style.display = "none";
            });
        }

        searchField.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                handleSearchSubmit();
            }
        });

        if (searchButton) {
            searchButton.addEventListener("click", handleSearchSubmit);
        }

        map.addEventListener("singleTap", () => {
            closeSidebarPanel();
            const qrContainer = document.getElementById("qrCodeContainer");
            if (qrContainer) {
                qrContainer.style.display = "none"; // Also hide QR code on map tap
            }
        });

        let hasCenteredOnce = false;
        document.getElementById("myLocationBtn").addEventListener("click", () => {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }
            navigator.geolocation.watchPosition(
                (position) => {
                    const coord = new mapkit.Coordinate(position.coords.latitude, position.coords.longitude);
                    myLocationCoord = coord;
                    showUserLocation(coord);
                    if (!hasCenteredOnce) {
                        map.region = new mapkit.CoordinateRegion(coord, new mapkit.CoordinateSpan(0.01, 0.01));
                        hasCenteredOnce = true;
                    }
                },
                () => {
                    alert("Unable to retrieve your location.");
                }
            );
        });

        function computeBounds(coords) {
            let minLat = coords[0].latitude, maxLat = coords[0].latitude;
            let minLon = coords[0].longitude, maxLon = coords[0].longitude;

            for (let i = 1; i < coords.length; i++) {
                const pt = coords[i];
                minLat = Math.min(minLat, pt.latitude);
                maxLat = Math.max(maxLat, pt.latitude);
                minLon = Math.min(minLon, pt.longitude);
                maxLon = Math.max(maxLon, pt.longitude);
            }

            const centerLat = (minLat + maxLat) / 2;
            const centerLon = (minLon + maxLon) / 2;
            const latDelta = (maxLat - minLat) * 1.2;
            const lonDelta = (maxLon - minLon) * 1.2;

            return new mapkit.CoordinateRegion(
                new mapkit.Coordinate(centerLat, centerLon),
                new mapkit.CoordinateSpan(latDelta, lonDelta)
            );
        }

        let allRouteOverlays = []; // stores all overlays so we can update styles
        let routeOverlay = null;

        function getDirections(destLat, destLon) {
            if (!myLocationCoord) {
                // Try to request location permission and get the location
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const coord = new mapkit.Coordinate(position.coords.latitude, position.coords.longitude);
                            myLocationCoord = coord;
                            showUserLocation(coord);
                            // Now, retry the directions with the updated location
                            getDirections(destLat, destLon);
                        },
                        (error) => {
                            alert("Unable to retrieve your location. Please allow location access.");
                            console.error("Geolocation error:", error);
                        }
                    );
                } else {
                    alert("Geolocation is not supported by your browser.");
                }
                return; // Exit for now; will retry after location is retrieved
            }

            if (!activeDestinationInfo) {
                activeDestinationInfo = {
                    name: "Selected destination",
                    address: "",
                    latitude: destLat,
                    longitude: destLon
                };
            }
            if (destinationField && activeDestinationInfo.name) {
                destinationField.value = activeDestinationInfo.name;
            }

            const directions = new mapkit.Directions();
            const origin = myLocationCoord;
            const destination = new mapkit.Coordinate(destLat, destLon);

            const request = {
                origin: origin,
                destination: destination,
                requestsAlternateRoutes: true,
                transportType: mapkit.Directions.Transport.Automobile
            };

            directions.route(request, (error, data) => {
                if (error || !data || !data.routes || data.routes.length === 0) {
                    console.error("Routing error:", error);
                    alert("Error getting route.");
                    return;
                }

                speechSynthesis.cancel(); // cancel any previous speech

                // Remove existing route overlays
                if (routeOverlay) { // This `routeOverlay` variable seems unused or improperly managed, `allRouteOverlays` is better.
                    map.removeOverlay(routeOverlay);
                    routeOverlay = null;
                }
                allRouteOverlays.forEach(o => map.removeOverlay(o));
                allRouteOverlays = [];

                // Clear sidebar
                sidebarContentElement.innerHTML = "";
                openSidebarPanel();

                // Store for external reference
                window.currentRouteData = data.routes;

                let allCoords = [];
                data.routes.forEach((route, index) => {
                    let routeCoords = [];
                    route.steps.forEach(step => {
                        if (step.path && Array.isArray(step.path)) {
                            routeCoords = routeCoords.concat(step.path);
                        }
                    });

                    const overlay = new mapkit.PolylineOverlay(
                        routeCoords.map(p => new mapkit.Coordinate(p.latitude, p.longitude))
                    );
                    overlay.routeIndex = index;
                    overlay.routeCoordinates = routeCoords;
                    overlay.style = new mapkit.Style({
                        strokeColor: index === 0 ? "#007aff" : "#999",
                        lineWidth: index === 0 ? 10 : 6,
                        lineDash: index === 0 ? [] : [6, 4],
                        lineJoin: "round",
                        lineCap: "round"
                    });
                    map.addOverlay(overlay);
                    allRouteOverlays.push(overlay);
                    allCoords = allCoords.concat(routeCoords);

                    if (index === 0) {
                        const durationMinutes = Math.round(route.expectedTravelTime / 60);
                        const distanceKm = (route.distance / 1000).toFixed(2);
                        const arrivalTime = new Date(Date.now() + route.expectedTravelTime * 1000);
                        const arrivalTimeStr = arrivalTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        const routeName = route.name || "Unnamed Route";
                        const mode = {
                            [mapkit.Directions.Transport.Automobile]: "Automobile",
                            [mapkit.Directions.Transport.Walking]: "Walking",
                            [mapkit.Directions.Transport.Transit]: "Transit"
                        }[route.transportType] || "Unknown";

                        sidebarContentElement.innerHTML = renderRouteSummary({
                            durationMinutes,
                            distanceKm,
                            arrivalTimeStr,
                            routeName,
                            mode
                        });
                        const startBtn = document.getElementById("startVoiceNav");
                        const stopBtn = document.getElementById("stopVoiceNav");
                        if (startBtn) {
                            startBtn.addEventListener("click", () => {
                                startVoiceNavigation(route.steps);
                            });
                        }
                        if (stopBtn) {
                            stopBtn.addEventListener("click", stopVoice);
                        }
                    }
                });

                // Zoom to fit all route coordinates
                if (allCoords.length > 0) {
                    const bounds = computeBounds(allCoords);
                    map.region = bounds;
                } else {
                    console.warn("⚠️ No route points to zoom.");
                }
            });
        }
        
        async function interpretNaturalQuery(userQuery) {
                const response = await fetch("https://771a-2001-56a-7899-dd00-a590-8898-4d99-8adf.ngrok-free.app/api/interpret", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ query: userQuery })
                });

                if (!response.ok) {
                    console.error("Failed to interpret query");
                    return;
                }

                const result = await response.json();
                console.log("Interpreted Result:", result);
                handleMapTask(result);
            }
        
        async function loadAndRenderFeatures(statField, geojsonUrl) {
            try {
                const response = await fetch(geojsonUrl);
                const geojson = await response.json();

                window.dynamicGeoJSON = geojson;

                // Calculate centroids using turf
                const centroids = {};
                geojson.features.forEach(feature => {
                    const center = turf.centroid(feature);
                    const name = feature.properties.name;
                    if (name && center?.geometry?.coordinates) {
                        const [lon, lat] = center.geometry.coordinates;
                        centroids[name] = [lat, lon];
                    }
                });

                // Save to global for label placement or popups
                window.dynamicCentroids = centroids;

                // Build FeatureCollection with statistics
                window.usStatistics = {
                    type: "FeatureCollection",
                    features: geojson.features.map(f => {
                        const featureName = f.properties.name;
                        const statValue = window.dynamicStatistics?.[featureName];

                        return {
                            type: "Feature",
                            properties: {
                                name: featureName,
                                [statField]: statValue
                            }
                        };
                    })
                };



                renderChoropleth(statField, geojson);
            } catch (error) {
                console.error("Failed to load GeoJSON:", error);
            }
        }

        
        
        function getColorForValue(norm) {
            const hue = (1 - norm) * 240; // blue (240) → red (0)
            return `hsl(${hue}, 70%, 50%)`;
        }
        
        function getFeatureCentroid(rings) {
            const coords = rings.flat();
            const validCoords = coords.filter(c => typeof c.latitude === "number" && typeof c.longitude === "number");

            if (validCoords.length === 0) {
                console.warn("Invalid coordinates in centroid calculation", coords);
                return { lat: 0, lon: 0 };  // fallback to avoid crash
            }

            const lats = validCoords.map(c => c.latitude);
            const lons = validCoords.map(c => c.longitude);
            const avgLat = lats.reduce((a, b) => a + b) / lats.length;
            const avgLon = lons.reduce((a, b) => a + b) / lons.length;
            return { lat: avgLat, lon: avgLon };
        }

        
        function renderChoropleth(statField) {
            if (!window.dynamicGeoJSON || !window.usStatistics) {
                console.warn("Missing GeoJSON or data");
                return;
            }
            

            // Remove previous overlays if any
            if (window.stateOverlays) {
                window.stateOverlays.forEach(o => map.removeOverlay(o));
            }
            window.stateOverlays = [];

            if (window.stateAnnotations) {
                window.stateAnnotations.forEach(a => map.removeAnnotation(a));
            }
            window.stateAnnotations = [];

            const values = usStatistics.features.map(f => f.properties[statField]);
            const min = Math.min(...values);
            const max = Math.max(...values);

            window.dynamicGeoJSON.features.forEach((feature) => {
                const stateName = feature.properties.name;
                const statFeature = usStatistics.features.find(f => f.properties.name === stateName);
                if (!statFeature) {
                    console.warn(`No statistics found for ${stateName}`);
                    return;
                }

                const value = statFeature.properties[statField];
                if (value === undefined) {
                    console.warn(`No value for ${statField} in ${stateName}`);
                    return;
                }
                const norm = (value - min) / (max - min);
                const fillColor = getColorForValue(norm);

                const rings = feature.geometry.coordinates.map(ring =>
                    ring.map(coord => {
                        // Flip [lon, lat] → [lat, lon]
                        if (Array.isArray(coord) && coord.length >= 2) {
                            const lon = coord[0];
                            const lat = coord[1];

                            if (typeof lat === "number" && typeof lon === "number") {
                                return new mapkit.Coordinate(lat, lon);
                            }
                        }

                        console.warn("Invalid coordinate:", coord);
                        return null;
                    }).filter(Boolean)
                );


                const polygon = new mapkit.PolygonOverlay(rings);

                polygon.style = new mapkit.Style({
                    fillColor: fillColor,
                    fillOpacity: 0.5,
                    strokeColor: "#333",
                    lineWidth: 1    // ✅ Correct property
                });

                map.addOverlay(polygon);
                window.stateOverlays.push(polygon);

                // ✅ Add label at centroid
                const centroid = window.dynamicCentroids?.[feature.properties.name];
                const center = centroid
                    ? { lat: centroid[0], lon: centroid[1] }
                    : getFeatureCentroid(rings);  // fallback

                
                const annotation = new mapkit.MarkerAnnotation(
                    new mapkit.Coordinate(center.lat, center.lon),
                    {
                        title: feature.properties.name,
                        subtitle: `${statField.charAt(0).toUpperCase() + statField.slice(1)}: ${value}`
                    }
                );
                map.addAnnotation(annotation);
                window.stateAnnotations.push(annotation);
            });
            
            const allCoords = [];

            window.dynamicGeoJSON.features.forEach(f => {
                const coords = f.geometry.coordinates;
                const depth = f.geometry.type === "Polygon" ? 1 : 2;

                const flattened = coords.flat(depth);
                flattened.forEach(c => {
                    if (Array.isArray(c) && c.length >= 2) {
                        allCoords.push(new mapkit.Coordinate(c[1], c[0]));
                    }
                });
            });


            if (allCoords.length > 0) {
                const lats = allCoords.map(c => c.latitude);
                const lons = allCoords.map(c => c.longitude);

                const minLat = Math.min(...lats);
                const maxLat = Math.max(...lats);
                const minLon = Math.min(...lons);
                const maxLon = Math.max(...lons);

                const centerLat = (minLat + maxLat) / 2;
                const centerLon = (minLon + maxLon) / 2;

                const region = new mapkit.CoordinateRegion(
                    new mapkit.Coordinate(centerLat, centerLon),
                    new mapkit.CoordinateSpan(maxLat - minLat, maxLon - minLon)
                );

                map.region = region;
            }

        }


        function handleMapTask(task) {
            if (task.task === "create_map" && task.statistics && task.geojson_url) {
                window.dynamicStatField = task.overlay;
                window.dynamicStatistics = task.statistics;
                window.dynamicCentroids = task.centroids || {};
                loadAndRenderFeatures(task.overlay, task.geojson_url);
            } else {
                alert("❌ Unsupported or malformed task");
                console.warn("Unhandled task:", task);
            }
        }

        document.getElementById("dataSearchInput").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const query = this.value;
                interpretNaturalQuery(query);  // Ensure this function is already defined elsewhere
            }
        });
    </script>
